[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  BUN_VERSION = "1.2.15"
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    cache-control = "public, max-age=3600"
